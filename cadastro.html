<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petshop Fucinhos Felizes - Cadastro e Agendamento</title>
    <link href="https://cdn. divinity.com/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">🐾 Petshop Fucinhos Felizes</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link active" href="cadastro.html">Cadastro & Agendamento</a>
                <a class="nav-link" href="ajuda.html">Ajuda</a>
            </div>
        </div>
    </nav>

    <div class="container shadow-lg p-4 bg-white rounded">
        <h2 class="text-center text-primary mb-4">Cadastro e Agendamento</h2>
        
        <form id="formPetshop">
            
            <fieldset class="border p-3 mb-4">
                <legend class="w-auto px-2">Identificação do Cliente</legend>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nomeCliente" class="form-label">Nome Completo:</label>
                        <input type="text" class="form-control" id="nomeCliente" placeholder="Ex: Priscila Rodrigues" required>
                    </div>
                    <div class="col-md-3">
                        <label for="cpf" class="form-label">CPF:</label>
                        <input type="number" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Sexo:</label><br>
                        <input type="radio" name="sexo" value="F" id="f" required> <label for="f">Feminino</label>
                        <input type="radio" name="sexo" value="M" id="m"> <label for="m">Masculino</label>
                    </div>
                    <div class="col-md-4">
                        <label for="email" class="form-label">E-mail:</label>
                        <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                    <div class="col-md-4">
                        <label for="tel" class="form-label">Telefone:</label>
                        <input type="tel" class="form-control" id="tel" placeholder="(51) 99999-9999" required>
                    </div>
                    <div class="col-md-4">
                        <label for="endereco" class="form-label">Endereço:</label>
                        <input type="text" class="form-control" id="endereco" placeholder="Rua, Número, Bairro">
                    </div>
                </div>
            </fieldset>

            <fieldset class="border p-3 mb-4 bg-light">
                <legend class="w-auto px-2">Dados do Pet</legend>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="nomePet" class="form-label">Nome do Pet:</label>
                        <input type="text" class="form-control" id="nomePet" placeholder="Nome do bichinho" required>
                    </div>
                    <div class="col-md-4">
                        <label for="raca" class="form-label">Raça:</label>
                        <select id="raca" class="form-select" required>
                            <option value="">Escolha...</option>
                            <option value="poodle">Poodle</option>
                            <option value="golden">Golden Retriever</option>
                            <option value="siames">Gato Siamês</option>
                            <option value="outra">Outra</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="idade" class="form-label">Idade (Anos):</label>
                        <input type="number" class="form-control" id="idade" min="0" max="30">
                    </div>
                </div>
            </fieldset>

            <fieldset class="border p-3 mb-4">
                <legend class="w-auto px-2">Serviço e Agendamento</legend>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Selecione o Serviço:</label><br>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input" id="banho" value="banho">
                            <label class="form-check-label" for="banho">Banho</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input" id="tosa" value="tosa">
                            <label class="form-check-label" for="tosa">Tosa</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Método de Agendamento:</label><br>
                        <input type="radio" name="metodo" value="telebusca" id="tele" required> <label for="tele">Tele-busca</label>
                        <input type="radio" name="metodo" value="local" id="local"> <label for="local">Entrega no local</label>
                    </div>
                    <div class="col-md-12 mt-3">
                        <label for="dataHora" class="form-label">Escolha Data e Horário:</label>
                        <input type="datetime-local" class="form-control" id="dataHora" required>
                    </div>
                </div>
            </fieldset>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">Finalizar Agendamento</button>
                <button type="reset" class="btn btn-secondary btn-lg">Limpar Tudo</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
